name: SWERI Processing
services:
  app:   
    image: ${DOCKER_IMAGE_NAME}
    build:
      context: ../
      dockerfile: ./docker/Dockerfile
    env_file:
      - "../.env"
    environment:
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}
    depends_on:
      celery:
        condition: service_healthy
    command: sh -c "python main.py"
#  app_console:
#      service:
#    extends:
#        app
#    ports: !reset [ ]
#    volumes:
#      - ..:/code
  rabbit:
    image: rabbitmq:4.0.1-management
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - ../rabbitmq.conf:/etc/rabbitmq/conf.d/rabbitmq.conf
    healthcheck:
      test: [ "CMD", "rabbitmqctl", "status" ]
      interval: 10s
      timeout: 5s
      retries: 5
  celery:
    depends_on:
      rabbit:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - "../.env"
    image: ${DOCKER_IMAGE_NAME}
    command: celery -A worker worker --loglevel=info
    healthcheck:
      test: [ "CMD-SHELL", "celery -A worker status | grep 'OK'" ]
      interval: 10s
      timeout: 10s
      retries: 5
    ports:
      - "5555:5555"
  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
