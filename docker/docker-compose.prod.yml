name: SWERI Processing prod
services:
  app:
    logging:
      driver: awslogs
      options:
        awslogs-region: us-west-2
        awslogs-group: /data-processing/prod
        awslogs-create-group: "true"
        awslogs-stream: app

  rabbit:
    logging:
      driver: awslogs
      options:
        awslogs-region: us-west-2
        awslogs-group: /data-processing/prod
        awslogs-create-group: "true"
        awslogs-stream: rabbit

  celery:
    command: celery -A worker worker --loglevel=warning
    ports:
      - "5555:5555"
    logging:
      driver: awslogs
      options:
        awslogs-region: us-west-2
        awslogs-group: /data-processing/prod
        awslogs-create-group: "true"
        awslogs-stream: celery

  redis:
    logging:
      driver: awslogs
      options:
        awslogs-region: us-west-2
        awslogs-group: /data-processing/prod
        awslogs-create-group: "true"
        awslogs-stream: redis
