name: SWERI Processing Staging
services:
  app:
    platform: linux/arm64
    logging:
      driver: awslogs
      options:
        awslogs-region: us-west-2
        awslogs-group: /data-processing/staging
        awslogs-create-group: "true"
        awslogs-stream: app

  rabbit:
    platform: linux/arm64
    logging:
      driver: awslogs
      options:
        awslogs-region: us-west-2
        awslogs-group: /data-processing/staging
        awslogs-create-group: "true"
        awslogs-stream: rabbit

  celery:
    platform: linux/arm64
    logging:
      driver: awslogs
      options:
        awslogs-region: us-west-2
        awslogs-group: /data-processing/staging
        awslogs-create-group: "true"
        awslogs-stream: celery

  redis:
    platform: linux/arm64
    logging:
      driver: awslogs
      options:
        awslogs-region: us-west-2
        awslogs-group: /data-processing/staging
        awslogs-create-group: "true"
        awslogs-stream: redis

  db:
    image: 730335541069.dkr.ecr.us-west-2.amazonaws.com/postgis-arm:latest
    platform: linux/arm64
    shm_size: '16gb'
    command: postgres -c max_wal_size=5GB -c wal_level=minimal -c synchronous_commit=off -c max_wal_senders=0 -c shared_buffers=4GB
    logging:
      driver: awslogs
      options:
        awslogs-region: us-west-2
        awslogs-group: /data-processing/staging
        awslogs-create-group: "true"
        awslogs-stream: db
